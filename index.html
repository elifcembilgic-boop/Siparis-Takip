<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OrderFlow Pro - Sipariş Takip</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background: #f8fafc; -webkit-tap-highlight-color: transparent; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const initialCustomers = [
          { id: 1, name: "Ahmet Yılmaz", email: "ahmet@email.com", phone: "0532 111 2233" },
          { id: 2, name: "Fatma Demir", email: "fatma@email.com", phone: "0541 444 5566" },
          { id: 3, name: "Mehmet Kaya", email: "mehmet@email.com", phone: "0555 777 8899" },
        ];

        const initialOrders = [
          { id: 1001, customerName: "Ahmet Yılmaz", product: "Laptop Stand", amount: 450, status: "teslim_edildi", date: "2026-05-10", notes: "Hediye paketi istendi.", trackingNo: "TR123456789" },
          { id: 1002, customerName: "Fatma Demir", product: "Mekanik Klavye", amount: 1200, status: "kargoda", date: "2026-05-18", notes: "Kargo acil.", trackingNo: "TR987654321" },
        ];

        const STATUS_CONFIG = {
          beklemede:      { label: "Beklemede",      color: "#f59e0b", bg: "#fef3c7" },
          hazirlaniyor:   { label: "Hazırlanıyor",   color: "#3b82f6", bg: "#dbeafe" },
          kargoda:        { label: "Kargoda",        color: "#8b5cf6", bg: "#ede9fe" },
          teslim_edildi:  { label: "Teslim Edildi",  color: "#10b981", bg: "#d1fae5" },
          iptal:          { label: "İptal",          color: "#ef4444", bg: "#fee2e2" },
        };

        function getSafeData(key, initialData) {
            try {
                const data = localStorage.getItem(key);
                return data ? JSON.parse(data) : initialData;
            } catch (error) { return initialData; }
        }

        function StatusBadge({ status }) {
          const cfg = STATUS_CONFIG[status] || STATUS_CONFIG.beklemede;
          return (
            <span style={{ padding: "4px 10px", borderRadius: 12, fontSize: 11, fontWeight: 600, color: cfg.color, background: cfg.bg, display: "inline-block" }}>
              {cfg.label}
            </span>
          );
        }

        function Avatar({ name, size = 32 }) {
          const initials = name ? name.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2) : "??";
          const colors = ["#6366f1","#ec4899","#f59e0b","#10b981","#3b82f6"];
          const color = name ? colors[name.charCodeAt(0) % colors.length] : "#94a3b8";
          return (
            <div style={{ width: size, height: size, borderRadius: "50%", background: color, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 700, fontSize: size * 0.38, flexShrink: 0 }}>
                {initials}
            </div>
          );
        }

        function App() {
          const [view, setView] = useState("dashboard");
          const [orders, setOrders] = useState(() => getSafeData("orders", initialOrders));
          const [customers, setCustomers] = useState(() => getSafeData("customers", initialCustomers));

          useEffect(() => { localStorage.setItem("orders", JSON.stringify(orders)); }, [orders]);
          useEffect(() => { localStorage.setItem("customers", JSON.stringify(customers)); }, [customers]);

          // Filtreler
          const [filterStatus, setFilterStatus] = useState("all");
          const [search, setSearch] = useState("");
          const [customerSearch, setCustomerSearch] = useState("");

          // Modallar
          const [showAddOrder, setShowAddOrder] = useState(false);
          const [showAddCustomer, setShowAddCustomer] = useState(false);
          const [showQuickCustomerModal, setShowQuickCustomerModal] = useState(false); // Hızlı müşteri modalı
          
          const [selectedOrder, setSelectedOrder] = useState(null);
          const [selectedCustomer, setSelectedCustomer] = useState(null);
          
          // Düzenleme Modları
          const [isEditingOrder, setIsEditingOrder] = useState(false);
          const [isEditingCustomer, setIsEditingCustomer] = useState(false);
          const [formError, setFormError] = useState("");

          // Form States
          const [newOrder, setNewOrder] = useState({ customerName: "", product: "", amount: "", status: "beklemede", date: new Date().toISOString().split("T")[0], notes: "", trackingNo: "" });
          const [newCustomer, setNewCustomer] = useState({ name: "", email: "", phone: "" });
          const [quickCustomer, setQuickCustomer] = useState({ name: "", phone: "" });

          // İstatistikler
          const totalRevenue = orders.filter(o => o.status === "teslim_edildi").reduce((s, o) => s + Number(o.amount || 0), 0);
          const activeOrders = orders.filter(o => !["teslim_edildi","iptal"].includes(o.status)).length;

          // Filtreleme Algoritmaları
          const filteredOrders = orders.filter(o => {
            const matchesStatus = filterStatus === "all" || o.status === filterStatus;
            const matchesSearch = o.customerName?.toLowerCase().includes(search.toLowerCase()) || 
                                  o.product?.toLowerCase().includes(search.toLowerCase()) ||
                                  o.notes?.toLowerCase().includes(search.toLowerCase()) ||
                                  String(o.id).includes(search);
            return matchesStatus && matchesSearch;
          });

          const filteredCustomers = customers.filter(c => 
            c.name?.toLowerCase().includes(customerSearch.toLowerCase()) || c.phone?.includes(customerSearch)
          );

          // Sipariş Ekle
          function handleAddOrder() {
            if (!newOrder.customerName || !newOrder.product || !String(newOrder.amount).trim()) {
              setFormError("Lütfen Müşteri, Ürün ve Tutar alanlarını dolduron.");
              return;
            }
            const id = orders.length > 0 ? Math.max(...orders.map(o => o.id)) + 1 : 1001;
            setOrders([...orders, { ...newOrder, id, amount: Number(newOrder.amount) }]);
            setNewOrder({ customerName: "", product: "", amount: "", status: "beklemede", date: new Date().toISOString().split("T")[0], notes: "", trackingNo: "" });
            setShowAddOrder(false);
            setFormError("");
          }

          // Hızlı Müşteri Ekle (Sipariş Ekranındayken)
          function handleAddQuickCustomer() {
            if (!quickCustomer.name.trim() || !quickCustomer.phone.trim()) {
              alert("Ad Soyad ve Telefon zorunludur.");
              return;
            }
            const id = customers.length > 0 ? Math.max(...customers.map(c => c.id)) + 1 : 1;
            const createdCustomer = { id, name: quickCustomer.name.trim(), phone: quickCustomer.phone.trim(), email: "" };
            
            setCustomers([...customers, createdCustomer]);
            setNewOrder({ ...newOrder, customerName: createdCustomer.name }); // Siparişe otomatik seç
            setQuickCustomer({ name: "", phone: "" });
            setShowQuickCustomerModal(false);
          }

          // Sipariş Düzenlemeyi Kaydet
          function handleSaveEditOrder() {
            if (!selectedOrder.customerName || !selectedOrder.product || !String(selectedOrder.amount).trim()) {
              setFormError("Gerekli alanlar boş bırakılamaz.");
              return;
            }
            setOrders(orders.map(o => o.id === selectedOrder.id ? { ...selectedOrder, amount: Number(selectedOrder.amount) } : o));
            setIsEditingOrder(false);
            setSelectedOrder(null);
            setFormError("");
          }

          // Sipariş Durumunu Anlık Değiştir (HIZLANDIRILDI)
          function handleInstantStatusUpdate(orderId, newStatus) {
            const updatedOrders = orders.map(o => o.id === orderId ? {...o, status: newStatus} : o);
            setOrders(updatedOrders);
            // Modal içindeki state'i de anında güncelle ki gözünün önünde değişsin
            setSelectedOrder({ ...selectedOrder, status: newStatus });
          }

          // Sipariş Sil
          function handleDeleteOrder(id) {
            if(confirm("Bu siparişi silmek istediğinize emin misiniz?")) {
              setOrders(orders.filter(o => o.id !== id));
              setSelectedOrder(null);
              setIsEditingOrder(false);
            }
          }

          // Müşteri Ekle
          function handleAddCustomer() {
            if (!newCustomer.name.trim() || !newCustomer.phone.trim()) {
              setFormError("Müşteri adı ve Telefon alanları zorunludur.");
              return;
            }
            const id = customers.length > 0 ? Math.max(...customers.map(c => c.id)) + 1 : 1;
            setCustomers([...customers, { ...newCustomer, id }]);
            setNewCustomer({ name: "", email: "", phone: "" });
            setShowAddCustomer(false);
            setFormError("");
          }

          // Müşteri Düzenlemeyi Kaydet
          function handleSaveEditCustomer() {
            if (!selectedCustomer.name.trim() || !selectedCustomer.phone.trim()) {
              setFormError("Ad ve Telefon boş bırakılamaz.");
              return;
            }
            setCustomers(customers.map(c => c.id === selectedCustomer.id ? selectedCustomer : c));
            setIsEditingCustomer(false);
            setSelectedCustomer(null);
            setFormError("");
          }

          // Müşteri Sil
          function handleDeleteCustomer(id) {
            if(confirm("Bu müşteriyi silmek istediğinize emin misiniz?")) {
              setCustomers(customers.filter(c => c.id !== id));
              setSelectedCustomer(null);
              setIsEditingCustomer(false);
            }
          }

          const S = styles;

          return (
            <div style={S.root}>
              {/* ÜST HEADER */}
              <header style={S.header}>
                <div style={S.headerLeft}>
                  <span style={{ fontSize: 22 }}>📦</span>
                  <span style={S.headerTitle}>OrderFlow Pro</span>
                </div>
                <div>
                  {view === "orders" && <button style={S.btnPrimarySmall} onClick={() => { setFormError(""); setShowAddOrder(true); }}>+ Sipariş</button>}
                  {view === "customers" && <button style={S.btnPrimarySmall} onClick={() => { setFormError(""); setShowAddCustomer(true); }}>+ Müşteri</button>}
                </div>
              </header>

              {/* ANA İÇERİK */}
              <main style={S.main}>
                
                {/* 1. ÖZET EKRANI */}
                {view === "dashboard" && (
                  <div style={S.content}>
                    <div style={S.viewTitle}>Genel Durum</div>
                    <div style={S.statsGrid}>
                      <div style={S.statCard}>
                        <div style={{...S.statIcon, background: "#ede9fe", color: "#6366f1"}}>📦</div>
                        <div><div style={S.statValue}>{orders.length}</div><div style={S.statLabel}>Toplam Sipariş</div></div>
                      </div>
                      <div style={S.statCard}>
                        <div style={{...S.statIcon, background: "#fef3c7", color: "#d97706"}}>🔄</div>
                        <div><div style={S.statValue}>{activeOrders}</div><div style={S.statLabel}>Aktif Sipariş</div></div>
                      </div>
                      <div style={S.statCard}>
                        <div style={{...S.statIcon, background: "#d1fae5", color: "#059669"}}>💰</div>
                        <div><div style={S.statValue}>₺{totalRevenue.toLocaleString("tr-TR")}</div><div style={S.statLabel}>Toplam Gelir</div></div>
                      </div>
                    </div>

                    <div style={S.card}>
                      <div style={S.cardTitle}>Son Hareketler</div>
                      <div style={{ marginTop: 8 }}>
                        {orders.slice(-4).reverse().map(o => (
                          <div key={o.id} style={S.mobileListItem} onClick={() => { setFormError(""); setIsEditingOrder(false); setSelectedOrder(o); }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                              <Avatar name={o.customerName} size={34} />
                              <div>
                                <div style={S.itemTitle}>{o.customerName}</div>
                                <div style={S.itemSub}>{o.product} · <b>₺{o.amount}</b></div>
                              </div>
                            </div>
                            <StatusBadge status={o.status} />
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {/* 2. SİPARİŞLER SEKMESİ */}
                {view === "orders" && (
                  <div style={S.content}>
                    <div style={S.viewTitle}>Sipariş Yönetimi</div>
                    <div style={S.filterRow}>
                      <input style={S.input} placeholder="Müşteri, ürün, not veya #ID ara..." value={search} onChange={e => setSearch(e.target.value)} />
                      <select style={S.select} value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
                        <option value="all">Tümü</option>
                        {Object.entries(STATUS_CONFIG).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                      </select>
                    </div>

                    <div style={{ paddingBottom: 20 }}>
                      {filteredOrders.slice().reverse().map(o => (
                        <div key={o.id} style={S.orderCard} onClick={() => { setFormError(""); setIsEditingOrder(false); setSelectedOrder(o); }}>
                          <div style={S.orderCardTop}>
                            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                              <Avatar name={o.customerName} size={36} />
                              <div>
                                <div style={S.itemTitle}>{o.customerName}</div>
                                <div style={S.itemSub}>#{o.id} · {o.date}</div>
                              </div>
                            </div>
                            <div style={{ fontWeight: 700, color: "#1e293b", fontSize: 15 }}>₺{o.amount}</div>
                          </div>
                          {o.notes && <div style={S.orderCardNotes}>📝 {o.notes.substring(0, 45)}{o.notes.length > 45 ? "..." : ""}</div>}
                          <div style={S.orderCardBottom}>
                            <span style={{ fontSize: 13, color: "#475569" }}>{o.product}</span>
                            <StatusBadge status={o.status} />
                          </div>
                        </div>
                      ))}
                      {filteredOrders.length === 0 && <div style={S.emptyState}>Sipariş bulunamadı.</div>}
                    </div>
                  </div>
                )}

                {/* 3. MÜŞTERİLER SEKMESİ */}
                {view === "customers" && (
                  <div style={S.content}>
                    <div style={S.viewTitle}>Müşteri Kartları</div>
                    <div style={S.filterRow}>
                      <input style={S.input} placeholder="İsim veya telefon numarası ara..." value={customerSearch} onChange={e => setCustomerSearch(e.target.value)} />
                    </div>

                    <div style={{ display: "flex", flexDirection: "column", gap: 10, paddingBottom: 20 }}>
                      {filteredCustomers.map(c => (
                        <div key={c.id} style={S.customerCard} onClick={() => { setFormError(""); setIsEditingCustomer(false); setSelectedCustomer(c); }}>
                          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", width: "100%" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                              <Avatar name={c.name} size={40} />
                              <div>
                                <div style={{ fontWeight: 600, fontSize: 15, color: "#1e293b" }}>{c.name}</div>
                                <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>📞 {c.phone}</div>
                              </div>
                            </div>
                            <span style={{color: "#cbd5e1"}}>❯</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

              </main>

              {/* ANA ALT NAVİGASYON */}
              <nav style={S.tabBar}>
                {[
                  { key: "dashboard", icon: "📊", label: "Özet" },
                  { key: "orders", icon: "📋", label: "Siparişler" },
                  { key: "customers", icon: "👥", label: "Müşteriler" },
                ].map(item => (
                  <button key={item.key} style={{ ...S.tabBtn, ...(view === item.key ? S.tabBtnActive : {}) }} onClick={() => setView(item.key)}>
                    <span style={{ fontSize: 20, marginBottom: 2 }}>{item.icon}</span>
                    <span>{item.label}</span>
                  </button>
                ))}
              </nav>

              {/* SİPARİŞ EKLEME MODAL */}
              {showAddOrder && (
                <div style={S.overlay} onClick={() => setShowAddOrder(false)}>
                  <div style={S.modal} onClick={e => e.stopPropagation()}>
                    <div style={S.modalHeader}>
                      <div style={S.modalTitle}>Yeni Sipariş Kaydı</div>
                      <button style={S.closeBtn} onClick={() => setShowAddOrder(false)}>✕</button>
                    </div>
                    {formError && <div style={S.errorMsg}>{formError}</div>}
                    <div style={S.modalBody}>
                      
                      <label style={S.label}>Müşteri Seçin *</label>
                      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                        <select style={{...S.selectFull, flex: 1}} value={newOrder.customerName} onChange={e => setNewOrder({...newOrder, customerName: e.target.value})}>
                          <option value="">-- Listeden Seçin --</option>
                          {customers.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}
                        </select>
                        <button type="button" style={S.btnQuickAdd} onClick={() => setShowQuickCustomerModal(true)}>➕ Yeni</button>
                      </div>

                      <label style={S.label}>Satılan Ürün *</label>
                      <input style={S.inputFull} placeholder="Örn: Deri Çanta" value={newOrder.product} onChange={e => setNewOrder({...newOrder, product: e.target.value})} />
                      
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                        <div>
                          <label style={S.label}>Tutar (₺) *</label>
                          <input style={S.inputFull} type="number" placeholder="0.00" value={newOrder.amount} onChange={e => setNewOrder({...newOrder, amount: e.target.value})} />
                        </div>
                        <div>
                          <label style={S.label}>Tarih</label>
                          <input style={S.inputFull} type="date" value={newOrder.date} onChange={e => setNewOrder({...newOrder, date: e.target.value})} />
                        </div>
                      </div>

                      <label style={S.label}>Kargo Takip No (Opsiyonel)</label>
                      <input style={S.inputFull} placeholder="Örn: KP0123456" value={newOrder.trackingNo} onChange={e => setNewOrder({...newOrder, trackingNo: e.target.value})} />

                      <label style={S.label}>Sipariş Notları</label>
                      <textarea style={S.textarea} placeholder="Müşteri talepleri, adres veya özel notlar..." rows="3" value={newOrder.notes} onChange={e => setNewOrder({...newOrder, notes: e.target.value})} />

                      <button style={{...S.btnPrimary, width: "100%", marginTop: 10}} onClick={handleAddOrder}>Siparişi Kaydet</button>
                    </div>
                  </div>
                </div>
              )}

              {/* HIZLI MÜŞTERİ EKLEME ALT MODALI */}
              {showQuickCustomerModal && (
                <div style={{...S.overlay, zIndex: 1100}} onClick={() => setShowQuickCustomerModal(false)}>
                  <div style={S.modal} onClick={e => e.stopPropagation()}>
                    <div style={S.modalHeader}>
                      <div style={S.modalTitle}>Hızlı Müşteri Kaydı</div>
                      <button style={S.closeBtn} onClick={() => setShowQuickCustomerModal(false)}>✕</button>
                    </div>
                    <div style={S.modalBody}>
                      <input style={S.inputFull} placeholder="Müşteri Adı Soyadı *" value={quickCustomer.name} onChange={e => setQuickCustomer({...quickCustomer, name: e.target.value})} />
                      <input style={S.inputFull} placeholder="Telefon Numarası *" value={quickCustomer.phone} onChange={e => setQuickCustomer({...quickCustomer, phone: e.target.value})} />
                      <button style={{...S.btnPrimary, width: "100%", marginTop: 5, background: "#10b981"}} onClick={handleAddQuickCustomer}>Müşteriyi Siparişe Ekle</button>
                    </div>
                  </div>
                </div>
              )}

              {/* SİPARİŞ DETAY VE DÜZENLEME MODAL */}
              {selectedOrder && (
                <div style={S.overlay} onClick={() => { setSelectedOrder(null); setIsEditingOrder(false); }}>
                  <div style={S.modal} onClick={e => e.stopPropagation()}>
                    <div style={S.modalHeader}>
                      <div style={S.modalTitle}>{isEditingOrder ? "Sipariş Kartını Düzenle" : "Sipariş Kartı"}</div>
                      <button style={S.closeBtn} onClick={() => { setSelectedOrder(null); setIsEditingOrder(false); }}>✕</button>
                    </div>
                    {formError && <div style={S.errorMsg}>{formError}</div>}

                    {isEditingOrder ? (
                      <div style={S.modalBody}>
                        <label style={S.label}>Müşteri İsmi</label>
                        <select style={S.selectFull} value={selectedOrder.customerName} onChange={e => setSelectedOrder({...selectedOrder, customerName: e.target.value})}>
                          {customers.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}
                        </select>
                        <label style={S.label}>Ürün</label>
                        <input style={S.inputFull} value={selectedOrder.product} onChange={e => setSelectedOrder({...selectedOrder, product: e.target.value})} />
                        <label style={S.label}>Tutar (₺)</label>
                        <input style={S.inputFull} type="number" value={selectedOrder.amount} onChange={e => setSelectedOrder({...selectedOrder, amount: e.target.value})} />
                        <label style={S.label}>Kargo Takip No</label>
                        <input style={S.inputFull} value={selectedOrder.trackingNo || ""} onChange={e => setSelectedOrder({...selectedOrder, trackingNo: e.target.value})} />
                        <label style={S.label}>Sipariş Notu</label>
                        <textarea style={S.textarea} rows="3" value={selectedOrder.notes || ""} onChange={e => setSelectedOrder({...selectedOrder, notes: e.target.value})} />
                        
                        <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
                          <button style={{...S.btnPrimary, flex: 1}} onClick={handleSaveEditOrder}>Değişiklikleri Kaydet</button>
                          <button style={{...S.btnSecondary, flex: 1}} onClick={() => setIsEditingOrder(false)}>İptal</button>
                        </div>
                      </div>
                    ) : (
                      <div style={S.modalBody}>
                        <div style={S.detailRow}><span>Müşteri:</span> <b>{selectedOrder.customerName}</b></div>
                        <div style={S.detailRow}><span>Ürün:</span> <span>{selectedOrder.product}</span></div>
                        <div style={S.detailRow}><span>Tutar:</span> <b style={{color: "#10b981", fontSize: 15}}>₺{selectedOrder.amount}</b></div>
                        <div style={S.detailRow}><span>Tarih:</span> <span>{selectedOrder.date}</span></div>
                        <div style={S.detailRow}><span>Kargo No:</span> <span>{selectedOrder.trackingNo || "Girilmemiş"}</span></div>
                        <div style={{...S.detailRow, flexDirection: "column", alignItems: "flex-start", gap: 5}}>
                            <span>Sipariş Notu:</span>
                            <div style={S.notesBox}>{selectedOrder.notes || "Not bırakılmamış."}</div>
                        </div>
                        
                        <div style={{ marginTop: 10, padding: "10px 0", borderTop: "1px solid #e2e8f0" }}>
                          <div style={{ fontSize: 11, fontWeight: 700, color: "#64748b", marginBottom: 6 }}>DURUMU ANLIK GÜNCELLE</div>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6 }}>
                            {Object.entries(STATUS_CONFIG).map(([k, v]) => (
                              <button key={k}
                                style={{ padding: "10px 4px", borderRadius: 8, border: "none", fontSize: 11, fontWeight: 600, cursor: "pointer", background: selectedOrder.status === k ? v.color : "#f1f5f9", color: selectedOrder.status === k ? "#fff" : "#475569" }}
                                onClick={() => handleInstantStatusUpdate(selectedOrder.id, k)}
                              >{v.label}</button>
                            ))}
                          </div>
                        </div>

                        <div style={S.actionArea}>
                          <button style={S.btnDelete} onClick={() => handleDeleteOrder(selectedOrder.id)}>🗑️ Siparişi Sil</button>
                          <button style={S.btnEdit} onClick={() => setIsEditingOrder(true)}>✏️ Bilgileri Düzenle</button>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* MÜŞTERİ EKLEME MODAL */}
              {showAddCustomer && (
                <div style={S.overlay} onClick={() => setShowAddCustomer(false)}>
                  <div style={S.modal} onClick={e => e.stopPropagation()}>
                    <div style={S.modalHeader}>
                      <div style={S.modalTitle}>Yeni Müşteri Oluştur</div>
                      <button style={S.closeBtn} onClick={() => setShowAddCustomer(false)}>✕</button>
                    </div>
                    {formError && <div style={S.errorMsg}>{formError}</div>}
                    <div style={S.modalBody}>
                      <input style={S.inputFull} placeholder="Müşteri Adı Soyadı *" value={newCustomer.name} onChange={e => setNewCustomer({...newCustomer, name: e.target.value})} />
                      <input style={S.inputFull} placeholder="Telefon Numarası *" value={newCustomer.phone} onChange={e => setNewCustomer({...newCustomer, phone: e.target.value})} />
                      <input style={S.inputFull} placeholder="E-posta Adresi (Opsiyonel)" value={newCustomer.email} onChange={e => setNewCustomer({...newCustomer, email: e.target.value})} />
                      <button style={{...S.btnPrimary, width: "100%", marginTop: 10}} onClick={handleAddCustomer}>Müşteriyi Kaydet</button>
                    </div>
                  </div>
                </div>
              )}

              {/* MÜŞTERİ DETAY VE DÜZENLEME MODAL */}
              {selectedCustomer && (
                <div style={S.overlay} onClick={() => { setSelectedCustomer(null); setIsEditingCustomer(false); }}>
                  <div style={S.modal} onClick={e => e.stopPropagation()}>
                    <div style={S.modalHeader}>
                      <div style={S.modalTitle}>{isEditingCustomer ? "Müşteri Düzenle" : "Müşteri Kartı"}</div>
                      <button style={S.closeBtn} onClick={() => { setSelectedCustomer(null); setIsEditingCustomer(false); }}>✕</button>
                    </div>
                    {formError && <div style={S.errorMsg}>{formError}</div>}

                    {isEditingCustomer ? (
                      <div style={S.modalBody}>
                        <label style={S.label}>Ad Soyad</label>
                        <input style={S.inputFull} value={selectedCustomer.name} onChange={e => setSelectedCustomer({...selectedCustomer, name: e.target.value})} />
                        <label style={S.label}>Telefon</label>
                        <input style={S.inputFull} value={selectedCustomer.phone} onChange={e => setSelectedCustomer({...selectedCustomer, phone: e.target.value})} />
                        <label style={S.label}>E-posta</label>
                        <input style={S.inputFull} value={selectedCustomer.email || ""} onChange={e => setSelectedCustomer({...selectedCustomer, email: e.target.value})} />
                        
                        <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
                          <button style={{...S.btnPrimary, flex: 1}} onClick={handleSaveEditCustomer}>Kaydet</button>
                          <button style={{...S.btnSecondary, flex: 1}} onClick={() => setIsEditingCustomer(false)}>İptal</button>
                        </div>
                      </div>
                    ) : (
                      <div style={S.modalBody}>
                        <div style={{display: "flex", flexDirection: "column", alignItems: "center", gap: 8, padding: "10px 0"}}>
                          <Avatar name={selectedCustomer.name} size={54} />
                          <div style={{fontSize: 16, fontWeight: 700, color: "#1e293b"}}>{selectedCustomer.name}</div>
                        </div>
                        <div style={S.detailRow}><span>Telefon:</span> <b>{selectedCustomer.phone}</b></div>
                        <div style={S.detailRow}><span>E-posta:</span> <span>{selectedCustomer.email || "Girilmemiş"}</span></div>
                        
                        <div style={S.actionArea}>
                          <button style={S.btnDelete} onClick={() => handleDeleteCustomer(selectedCustomer.id)}>🗑️ Müşteriyi Sil</button>
                          <button style={S.btnEdit} onClick={() => setIsEditingCustomer(true)}>✏️ Bilgileri Düzenle</button>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>
          );
        }

        const styles = {
          root: { display: "flex", flexDirection: "column", height: "100vh", background: "#f8fafc", fontFamily: "'DM Sans', sans-serif", overflow: "hidden" },
          header: { background: "#0f172a", color: "#fff", padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", boxSizing: "border-box" },
          headerLeft: { display: "flex", alignItems: "center", gap: 8 },
          headerTitle: { fontWeight: 700, fontSize: 16, fontFamily: "'DM Serif Display', Georgia, serif" },
          main: { flex: 1, overflowY: "auto", paddingBottom: 70 },
          content: { padding: 16 },
          viewTitle: { fontSize: 20, fontWeight: 800, color: "#1e293b", marginBottom: 14, fontFamily: "'DM Serif Display', Georgia, serif" },
          statsGrid: { display: "flex", flexDirection: "column", gap: 10, marginBottom: 16 },
          statCard: { background: "#fff", borderRadius: 12, padding: 12, display: "flex", alignItems: "center", gap: 12, boxShadow: "0 1px 2px rgba(0,0,0,0.05)" },
          statIcon: { width: 36, height: 36, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 },
          statValue: { fontSize: 18, fontWeight: 700, color: "#1e293b" },
          statLabel: { fontSize: 11, color: "#64748b" },
          card: { background: "#fff", borderRadius: 12, padding: 14, boxShadow: "0 1px 2px rgba(0,0,0,0.05)" },
          cardTitle: { fontWeight: 700, fontSize: 14, color: "#1e293b", borderBottom: "1px solid #f1f5f9", paddingBottom: 6 },
          mobileListItem: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: "1px solid #f8fafc" },
          itemTitle: { fontWeight: 600, fontSize: 13, color: "#1e293b" },
          itemSub: { fontSize: 11, color: "#64748b", marginTop: 2 },
          filterRow: { display: "flex", gap: 8, marginBottom: 12 },
          input: { flex: 1, padding: "8px 12px", borderRadius: 8, border: "1.5px solid #e2e8f0", fontSize: 13, outline: "none" },
          select: { padding: "8px", borderRadius: 8, border: "1.5px solid #e2e8f0", fontSize: 13, background: "#fff", color: "#475569" },
          orderCard: { background: "#fff", borderRadius: 12, padding: 12, marginBottom: 10, boxShadow: "0 1px 2px rgba(0,0,0,0.05)" },
          orderCardTop: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 },
          orderCardNotes: { background: "#f8fafc", padding: "6px 10px", borderRadius: 6, fontSize: 12, color: "#475569", marginBottom: 8, borderLeft: "3px solid #6366f1" },
          orderCardBottom: { display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: 6, borderTop: "1px solid #f8fafc" },
          customerCard: { background: "#fff", borderRadius: 12, padding: 12, boxShadow: "0 1px 2px rgba(0,0,0,0.05)" },
          emptyState: { textAlign: "center", padding: 30, color: "#94a3b8", fontSize: 13 },
          tabBar: { position: "fixed", bottom: 0, left: 0, right: 0, height: 56, background: "#fff", borderTop: "1px solid #e2e8f0", display: "flex", justifyContent: "space-around", alignItems: "center", zIndex: 100 },
          tabBtn: { display: "flex", flexDirection: "column", alignItems: "center", background: "transparent", border: "none", color: "#94a3b8", fontSize: 10, fontWeight: 500 },
          tabBtnActive: { color: "#6366f1", fontWeight: 700 },
          btnPrimary: { padding: "10px 16px", borderRadius: 8, border: "none", background: "#6366f1", color: "#fff", fontWeight: 700, fontSize: 13 },
          btnPrimarySmall: { padding: "6px 12px", borderRadius: 6, border: "none", background: "#6366f1", color: "#fff", fontWeight: 700, fontSize: 12 },
          btnSecondary: { padding: "10px 16px", borderRadius: 8, border: "1.5px solid #e2e8f0", background: "#fff", color: "#475569", fontWeight: 600, fontSize: 13 },
          btnQuickAdd: { padding: "9px 12px", borderRadius: 8, border: "none", background: "#6366f1", color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer" },
          overlay: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 1000 },
          modal: { background: "#fff", borderTopLeftRadius: 16, borderTopRightRadius: 16, padding: 20, width: "100%", boxSizing: "border-box", animation: "slideUp 0.2s ease-out", maxHeight: "92vh", overflowY: "auto" },
          modalHeader: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 },
          modalTitle: { fontWeight: 800, fontSize: 17, color: "#1e293b" },
          closeBtn: { background: "#f1f5f9", border: "none", borderRadius: "50%", width: 28, height: 28, color: "#64748b" },
          modalBody: { display: "flex", flexDirection: "column", gap: 8 },
          detailRow: { display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid #f1f5f9", fontSize: 13, color: "#334155" },
          notesBox: { background: "#f1f5f9", padding: 8, borderRadius: 8, fontSize: 12, color: "#475569", width: "100%", boxSizing: "border-box", marginTop: 4, minHeight: 40 },
          inputFull: { width: "100%", padding: "9px 12px", borderRadius: 8, border: "1.5px solid #e2e8f0", fontSize: 13, boxSizing: "border-box", outline: "none", background: "#f8fafc" },
          selectFull: { width: "100%", padding: "9px 12px", borderRadius: 8, border: "1.5px solid #e2e8f0", fontSize: 13, boxSizing: "border-box", background: "#f8fafc" },
          textarea: { width: "100%", padding: "9px 12px", borderRadius: 8, border: "1.5px solid #e2e8f0", fontSize: 13, boxSizing: "border-box", outline: "none", background: "#f8fafc", fontFamily: "inherit" },
          label: { fontSize: 11, fontWeight: 700, color: "#64748b", marginTop: 2 },
          errorMsg: { background: "#fee2e2", color: "#ef4444", padding: "8px 12px", borderRadius: 8, fontSize: 12, fontWeight: 600 },
          actionArea: { display: "flex", gap: 10, marginTop: 15, paddingTop: 12, borderTop: "1px solid #e2e8f0" },
          btnDelete: { flex: 1, padding: "10px", borderRadius: 8, border: "1px solid #fee2e2", background: "#fef2f2", color: "#ef4444", fontWeight: 700, fontSize: 13 },
          btnEdit: { flex: 1, padding: "10px", borderRadius: 8, border: "none", background: "#0f172a", color: "#fff", fontWeight: 700, fontSize: 13 }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
