<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OrderFlow - Sipariş Takip Sistemi</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background: #f8fafc; -webkit-tap-highlight-color: transparent; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const initialCustomers = [
          { id: 1, name: "Ahmet Yılmaz", email: "ahmet@email.com", phone: "0532 111 2233" },
          { id: 2, name: "Fatma Demir", email: "fatma@email.com", phone: "0541 444 5566" },
          { id: 3, name: "Mehmet Kaya", email: "mehmet@email.com", phone: "0555 777 8899" },
        ];

        const initialOrders = [
          { id: 1001, customerName: "Ahmet Yılmaz", product: "Laptop Stand", amount: 450, status: "teslim_edildi", date: "2026-05-10" },
          { id: 1002, customerName: "Fatma Demir", product: "Mekanik Klavye", amount: 1200, status: "kargoda", date: "2026-05-18" },
          { id: 1003, customerName: "Fatma Demir", product: "Mouse Pad XL", amount: 350, status: "hazirlaniyor", date: "2026-05-20" },
          { id: 1004, customerName: "Mehmet Kaya", product: "USB Hub", amount: 280, status: "beklemede", date: "2026-05-22" },
          { id: 1005, customerName: "Ahmet Yılmaz", product: "Webcam HD", amount: 800, status: "hazirlaniyor", date: "2026-05-23" },
        ];

        const STATUS_CONFIG = {
          beklemede:      { label: "Beklemede",      color: "#f59e0b", bg: "#fef3c7" },
          hazirlaniyor:   { label: "Hazırlanıyor",   color: "#3b82f6", bg: "#dbeafe" },
          kargoda:        { label: "Kargoda",        color: "#8b5cf6", bg: "#ede9fe" },
          teslim_edildi:  { label: "Teslim Edildi",  color: "#10b981", bg: "#d1fae5" },
          iptal:          { label: "İptal",          color: "#ef4444", bg: "#fee2e2" },
        };

        function getSafeData(key, initialData) {
            try {
                const data = localStorage.getItem(key);
                return data ? JSON.parse(data) : initialData;
            } catch (error) {
                return initialData;
            }
        }

        function StatusBadge({ status }) {
          const cfg = STATUS_CONFIG[status] || STATUS_CONFIG.beklemede;
          return (
            <span style={{ padding: "4px 10px", borderRadius: 12, fontSize: 11, fontWeight: 600, color: cfg.color, background: cfg.bg, display: "inline-block" }}>
              {cfg.label}
            </span>
          );
        }

        function Avatar({ name, size = 32 }) {
          const initials = name ? name.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2) : "??";
          const colors = ["#6366f1","#ec4899","#f59e0b","#10b981","#3b82f6"];
          const color = name ? colors[name.charCodeAt(0) % colors.length] : "#94a3b8";
          return (
            <div style={{ width: size, height: size, borderRadius: "50%", background: color, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 700, fontSize: size * 0.38, flexShrink: 0 }}>
                {initials}
            </div>
          );
        }

        function App() {
          const [view, setView] = useState("dashboard");
          const [orders, setOrders] = useState(() => getSafeData("orders", initialOrders));
          const [customers, setCustomers] = useState(() => getSafeData("customers", initialCustomers));

          useEffect(() => {
            try { localStorage.setItem("orders", JSON.stringify(orders)); } catch(e) {}
          }, [orders]);

          useEffect(() => {
            try { localStorage.setItem("customers", JSON.stringify(customers)); } catch(e) {}
          }, [customers]);

          // Filtreler
          const [filterStatus, setFilterStatus] = useState("all");
          const [search, setSearch] = useState("");
          const [customerSearch, setCustomerSearch] = useState("");

          // Modallar
          const [showAddOrder, setShowAddOrder] = useState(false);
          const [showAddCustomer, setShowAddCustomer] = useState(false);
          const [selectedOrder, setSelectedOrder] = useState(null);
          const [selectedCustomer, setSelectedCustomer] = useState(null);
          
          // Düzenleme Modları
          const [isEditingOrder, setIsEditingOrder] = useState(false);
          const [isEditingCustomer, setIsEditingCustomer] = useState(false);

          // Form Hata Yönetimi
          const [formError, setFormError] = useState("");

          // Form State'leri
          const [newOrder, setNewOrder] = useState({ customerName: "", product: "", amount: "", status: "beklemede", date: new Date().toISOString().split("T")[0] });
          const [newCustomer, setNewCustomer] = useState({ name: "", email: "", phone: "" });

          // İstatistik Hesaplamaları
          const totalRevenue = orders.filter(o => o.status === "teslim_edildi").reduce((s, o) => s + Number(o.amount || 0), 0);
          const activeOrders = orders.filter(o => !["teslim_edildi","iptal"].includes(o.status)).length;

          // Gelişmiş Sipariş Filtreleme Mantığı
          const filteredOrders = orders.filter(o => {
            const matchesStatus = filterStatus === "all" || o.status === filterStatus;
            const matchesSearch = o.customerName?.toLowerCase().includes(search.toLowerCase()) || 
                                  o.product?.toLowerCase().includes(search.toLowerCase()) ||
                                  String(o.id).includes(search);
            return matchesStatus && matchesSearch;
          });

          // Müşteri Filtreleme Mantığı
          const filteredCustomers = customers.filter(c => 
            c.name?.toLowerCase().includes(customerSearch.toLowerCase()) || 
            c.phone?.includes(customerSearch)
          );

          // Sipariş Ekleme & Doğrulama
          function handleAddOrder() {
            if (!newOrder.customerName.trim() || !newOrder.product.trim() || !String(newOrder.amount).trim()) {
              setFormError("Lütfen tüm zorunlu alanları doldurun.");
              return;
            }
            if (isNaN(newOrder.amount) || Number(newOrder.amount) <= 0) {
              setFormError("Lütfen geçerli bir tutar girin.");
              return;
            }

            const id = orders.length > 0 ? Math.max(...orders.map(o => o.id)) + 1 : 1001;
            setOrders([...orders, { ...newOrder, id, amount: Number(newOrder.amount) }]);
            setNewOrder({ customerName: "", product: "", amount: "", status: "beklemede", date: new Date().toISOString().split("T")[0] });
            setShowAddOrder(false);
            setFormError("");
          }

          // Sipariş Düzenleme & Kaydetme
          function handleSaveEditOrder() {
            if (!selectedOrder.customerName.trim() || !selectedOrder.product.trim() || !String(selectedOrder.amount).trim()) {
              setFormError("Alanlar boş bırakılamaz.");
              return;
            }
            if (isNaN(selectedOrder.amount) || Number(selectedOrder.amount) <= 0) {
              setFormError("Geçerli bir tutar girin.");
              return;
            }

            setOrders(orders.map(o => o.id === selectedOrder.id ? { ...selectedOrder, amount: Number(selectedOrder.amount) } : o));
            setIsEditingOrder(false);
            setSelectedOrder(null);
            setFormError("");
          }

          // Sipariş Silme
          function handleDeleteOrder(orderId) {
            if(confirm("Bu siparişi silmek istediğinize emin misiniz?")) {
              setOrders(orders.filter(o => o.id !== orderId));
              setSelectedOrder(null);
              setIsEditingOrder(false);
            }
          }

          // Müşteri Ekleme & Doğrulama
          function handleAddCustomer() {
            if (!newCustomer.name.trim() || !newCustomer.phone.trim()) {
              setFormError("Ad Soyad ve Telefon alanları zorunludur.");
              return;
            }

            const id = customers.length > 0 ? Math.max(...customers.map(c => c.id)) + 1 : 1;
            setCustomers([...customers, { ...newCustomer, id }]);
            setNewCustomer({ name: "", email: "", phone: "" });
            setShowAddCustomer(false);
            setFormError("");
          }

          // Müşteri Düzenleme & Kaydetme
          function handleSaveEditCustomer() {
            if (!selectedCustomer.name.trim() || !selectedCustomer.phone.trim()) {
              setFormError("Ad Soyad ve Telefon boş bırakılamaz.");
              return;
            }

            setCustomers(customers.map(c => c.id === selectedCustomer.id ? selectedCustomer : c));
            setIsEditingCustomer(false);
            setSelectedCustomer(null);
            setFormError("");
          }

          // Müşteri Silme
          function handleDeleteCustomer(customerId) {
            if(confirm("Bu müşteriyi silmek istediğinize emin misiniz? Müşteriye ait siparişler silinmez.")) {
              setCustomers(customers.filter(c => c.id !== customerId));
              setSelectedCustomer(null);
              setIsEditingCustomer(false);
            }
          }

          function updateStatus(orderId, status) {
            setOrders(orders.map(o => o.id === orderId ? { ...o, status } : o));
            if (selectedOrder?.id === orderId) setSelectedOrder({ ...selectedOrder, status });
          }

          const S = styles;

          return (
            <div style={S.root}>
              {/* Üst Başlık Alanı */}
              <header style={S.header}>
                <div style={S.headerLeft}>
                  <span style={{ fontSize: 22 }}>📦</span>
                  <span style={S.headerTitle}>OrderFlow</span>
                </div>
                <div>
                  {view === "orders" && <button style={S.btnPrimarySmall} onClick={() => { setFormError(""); setShowAddOrder(true); }}>+ Ekle</button>}
                  {view === "customers" && <button style={S.btnPrimarySmall} onClick={() => { setFormError(""); setShowAddCustomer(true); }}>+ Ekle</button>}
                </div>
              </header>

              {/* Ana İçerik Alanı */}
              <main style={S.main}>
                
                {/* GENEL BAKIŞ */}
                {view === "dashboard" && (
                  <div style={S.content}>
                    <div style={S.viewTitle}>Genel Bakış</div>
                    
                    <div style={S.statsGrid}>
                      <div style={S.statCard}>
                        <div style={{...S.statIcon, background: "#ede9fe", color: "#6366f1"}}>📦</div>
                        <div>
                          <div style={S.statValue}>{orders.length}</div>
                          <div style={S.statLabel}>Toplam Sipariş</div>
                        </div>
                      </div>
                      <div style={S.statCard}>
                        <div style={{...S.statIcon, background: "#fef3c7", color: "#d97706"}}>🔄</div>
                        <div>
                          <div style={S.statValue}>{activeOrders}</div>
                          <div style={S.statLabel}>Aktif Sipariş</div>
                        </div>
                      </div>
                      <div style={S.statCard}>
                        <div style={{...S.statIcon, background: "#d1fae5", color: "#059669"}}>💰</div>
                        <div>
                          <div style={S.statValue}>₺{totalRevenue.toLocaleString("tr-TR")}</div>
                          <div style={S.statLabel}>Toplam Gelir</div>
                        </div>
                      </div>
                    </div>

                    <div style={S.card}>
                      <div style={S.cardTitle}>Son Siparişler</div>
                      <div style={{ marginTop: 12 }}>
                        {orders.slice(-4).reverse().map(o => (
                          <div key={o.id} style={S.mobileListItem} onClick={() => { setFormError(""); setIsEditingOrder(false); setSelectedOrder(o); }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                              <Avatar name={o.customerName} size={34} />
                              <div>
                                <div style={S.itemTitle}>{o.customerName}</div>
                                <div style={S.itemSub}>{o.product} · <b>₺{o.amount}</b></div>
                              </div>
                            </div>
                            <StatusBadge status={o.status} />
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {/* SİPARİŞLER LİSTESİ */}
                {view === "orders" && (
                  <div style={S.content}>
                    <div style={S.viewTitle}>Siparişler</div>
                    
                    {/* Filtreleme Arayüzü */}
                    <div style={S.filterRow}>
                      <input style={S.input} placeholder="Müşteri, ürün veya #ID ara..." value={search} onChange={e => setSearch(e.target.value)} />
                      <select style={S.select} value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
                        <option value="all">Tüm Durumlar</option>
                        {Object.entries(STATUS_CONFIG).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                      </select>
                    </div>

                    <div style={{ paddingBottom: 20 }}>
                      {filteredOrders.slice().reverse().map(o => (
                        <div key={o.id} style={S.orderCard} onClick={() => { setFormError(""); setIsEditingOrder(false); setSelectedOrder(o); }}>
                          <div style={S.orderCardTop}>
                            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                              <Avatar name={o.customerName} size={36} />
                              <div>
                                <div style={S.itemTitle}>{o.customerName}</div>
                                <div style={S.itemSub}>#{o.id} · {o.date}</div>
                              </div>
                            </div>
                            <div style={{ fontWeight: 700, color: "#1e293b", fontSize: 15 }}>₺{o.amount}</div>
                          </div>
                          <div style={S.orderCardBottom}>
                            <span style={{ fontSize: 13, color: "#475569" }}>{o.product}</span>
                            <StatusBadge status={o.status} />
                          </div>
                        </div>
                      ))}
                      {filteredOrders.length === 0 && <div style={S.emptyState}>Aranan kriterde sipariş bulunamadı.</div>}
                    </div>
                  </div>
                )}

                {/* MÜŞTERİLER LİSTESİ */}
                {view === "customers" && (
                  <div style={S.content}>
                    <div style={S.viewTitle}>Müşteriler</div>
                    
                    <div style={S.filterRow}>
                      <input style={S.input} placeholder="Müşteri adı veya telefon ara..." value={customerSearch} onChange={e => setCustomerSearch(e.target.value)} />
                    </div>

                    <div style={{ display: "flex", flexDirection: "column", gap: 10, paddingBottom: 20 }}>
                      {filteredCustomers.map(c => (
                        <div key={c.id} style={S.customerCard} onClick={() => { setFormError(""); setIsEditingCustomer(false); setSelectedCustomer(c); }}>
                          <div style={{ display: "flex", alignItems: "center", justifyScontent: "space-between", width: "100%" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                              <Avatar name={c.name} size={40} />
                              <div>
                                <div style={{ fontWeight: 600, fontSize: 15, color: "#1e293b" }}>{c.name}</div>
                                <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>📞 {c.phone}</div>
                                {c.email && <div style={{ fontSize: 12, color: "#64748b" }}>✉️ {c.email}</div>}
                              </div>
                            </div>
                            <span style={{color: "#a1a1aa", fontSize: 18}}>❯</span>
                          </div>
                        </div>
                      ))}
                      {filteredCustomers.length === 0 && <div style={S.emptyState}>Müşteri bulunamadı.</div>}
                    </div>
                  </div>
                )}

              </main>

              {/* MOBİL ALT MENÜ (TAB BAR) */}
              <nav style={S.tabBar}>
                {[
                  { key: "dashboard", icon: "📊", label: "Özet" },
                  { key: "orders", icon: "📋", label: "Siparişler" },
                  { key: "customers", icon: "👥", label: "Müşteriler" },
                ].map(item => (
                  <button key={item.key} style={{ ...S.tabBtn, ...(view === item.key ? S.tabBtnActive : {}) }} onClick={() => setView(item.key)}>
                    <span style={{ fontSize: 20, marginBottom: 2 }}>{item.icon}</span>
                    <span>{item.label}</span>
                  </button>
                ))}
              </nav>

              {/* SİPARİŞ DETAY VE DÜZENLEME MODALI */}
              {selectedOrder && (
                <div style={S.overlay} onClick={() => { setSelectedOrder(null); setIsEditingOrder(false); }}>
                  <div style={S.modal} onClick={e => e.stopPropagation()}>
                    <div style={S.modalHeader}>
                      <div style={{ fontWeight: 800, fontSize: 18 }}>{isEditingOrder ? "Siparişi Düzenle" : "Sipariş Detayı"}</div>
                      <button style={S.closeBtn} onClick={() => { setSelectedOrder(null); setIsEditingOrder(false); }}>✕</button>
                    </div>
                    
                    {formError && <div style={S.errorMsg}>{formError}</div>}

                    {isEditingOrder ? (
                      <div style={S.modalBody}>
                        <label style={S.label}>Müşteri Adı</label>
                        <input style={S.inputFull} value={selectedOrder.customerName} onChange={e => setSelectedOrder({...selectedOrder, customerName: e.target.value})} />
                        <label style={S.label}>Ürün</label>
                        <input style={S.inputFull} value={selectedOrder.product} onChange={e => setSelectedOrder({...selectedOrder, product: e.target.value})} />
                        <label style={S.label}>Tutar (₺)</label>
                        <input style={S.inputFull} type="number" value={selectedOrder.amount} onChange={e => setSelectedOrder({...selectedOrder, amount: e.target.value})} />
                        <label style={S.label}>Tarih</label>
                        <input style={S.inputFull} type="date" value={selectedOrder.date} onChange={e => setSelectedOrder({...selectedOrder, date: e.target.value})} />
                        
                        <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
                          <button style={{...S.btnPrimary, flex: 1}} onClick={handleSaveEditOrder}>Değişiklikleri Kaydet</button>
                          <button style={{...S.btnSecondary, flex: 1}} onClick={() => { setIsEditingOrder(false); setFormError(""); }}>İptal</button>
                        </div>
                      </div>
                    ) : (
                      <div style={S.modalBody}>
                        <div style={S.detailRow}><span>Müşteri:</span> <b>{selectedOrder.customerName}</b></div>
                        <div style={S.detailRow}><span>Ürün:</span> <span>{selectedOrder.product}</span></div>
                        <div style={S.detailRow}><span>Tutar:</span> <b style={{color: "#10b981"}}>₺{selectedOrder.amount}</b></div>
                        <div style={S.detailRow}><span>Tarih:</span> <span>{selectedOrder.date}</span></div>
                        <div style={{...S.detailRow, border: "none"}}><span>Mevcut Durum:</span> <StatusBadge status={selectedOrder.status} /></div>
                        
                        <div style={{ marginTop: 10, paddingTop: 12, borderTop: "1px solid #e2e8f0" }}>
                          <div style={{ fontSize: 11, fontWeight: 700, color: "#64748b", marginBottom: 8 }}>DURUMU GÜNCELLE</div>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6 }}>
                            {Object.entries(STATUS_CONFIG).map(([k, v]) => (
                              <button key={k}
                                style={{ padding: "6px 4px", borderRadius: 6, border: "none", fontSize: 11, fontWeight: 600, cursor: "pointer", background: selectedOrder.status === k ? v.color : "#f1f5f9", color: selectedOrder.status === k ? "#fff" : "#475569" }}
                                onClick={() => updateStatus(selectedOrder.id, k)}
                              >{v.label}</button>
                            ))}
                          </div>
                        </div>

                        <div style={{ display: "flex", gap: 10, marginTop: 15, paddingTop: 12, borderTop: "1px solid #e2e8f0" }}>
                          <button style={{...S.btnSecondary, flex: 1, background: "#fef2f2", color: "#ef4444", border: "1px solid #fee2fee"}} onClick={() => handleDeleteOrder(selectedOrder.id)}>🗑️ Siparişi Sil</button>
                          <button style={{...S.btnPrimary, flex: 1}} onClick={() => setIsEditingOrder(true)}>✏️ Düzenle</button>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* MÜŞTERİ DETAY VE DÜZENLEME MODALI */}
              {selectedCustomer && (
                <div style={S.overlay} onClick={() => { setSelectedCustomer(null); setIsEditingCustomer(false); }}>
                  <div style={S.modal} onClick={e => e.stopPropagation()}>
                    <div style={S.modalHeader}>
                      <div style={{ fontWeight: 800, fontSize: 18 }}>{isEditingCustomer ? "Müşteriyi Düzenle" : "Müşteri Bilgisi"}</div>
                      <button style={S.closeBtn} onClick={() => { setSelectedCustomer(null); setIsEditingCustomer(false); }}>✕</button>
                    </div>

                    {formError && <div style={S.errorMsg}>{formError}</div>}

                    {isEditingCustomer ? (
                      <div style={S.modalBody}>
                        <label style={S.label}>Ad Soyad</label>
                        <input style={S.inputFull} value={selectedCustomer.name} onChange={e => setSelectedCustomer({...selectedCustomer, name: e.target.value})} />
                        <label style={S.label}>Telefon</label>
                        <input style={S.inputFull} value={selectedCustomer.phone} onChange={e => setSelectedCustomer({...selectedCustomer, phone: e.target.value})} />
                        <label style={S.label}>E-posta</label>
                        <input style={S.inputFull} value={selectedCustomer.email || ""} onChange={e => setSelectedCustomer({...selectedCustomer, email: e.target.value})} />
                        
                        <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
                          <button style={{...S.btnPrimary, flex: 1}} onClick={handleSaveEditCustomer}>Kaydet</button>
                          <button style={{...S.btnSecondary, flex: 1}} onClick={() => { setIsEditingCustomer(false); setFormError(""); }}>İptal</button>
                        </div>
                      </div>
                    ) : (
                      <div style={S.modalBody}>
                        <div style={{display: "flex", flexDirection: "column", alignItems: "center", gap: 10, padding: "10px 0"}}>
                          <Avatar name={selectedCustomer.name} size={60} />
                          <div style={{fontSize: 18, fontWeight: 700, color: "#1e293b"}}>{selectedCustomer.name}</div>
                        </div>
                        <div style={S.detailRow}><span>Telefon:</span> <b>{selectedCustomer.phone}</b></div>
                        <div style={S.detailRow}><span>E-posta:</span> <span>{selectedCustomer.email || "Girilmemiş"}</span></div>
                        
                        <div style={{ display: "flex", gap: 10, marginTop: 20 }}>
                          <button style={{...S.btnSecondary, flex: 1, background: "#fef2f2", color: "#ef4444", border: "1px solid #fee2e2"}} onClick={() => handleDeleteCustomer(selectedCustomer.id)}>🗑️ Müşteriyi Sil</button>
                          <button style={{...S.btnPrimary, flex: 1}} onClick={() => setIsEditingCustomer(true)}>✏️ Bilgileri Düzenle</button>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* YENİ SİPARİŞ EKLEME MODALI */}
              {showAddOrder && (
                <div style={S.overlay} onClick={() => setShowAddOrder(false)}>
                  <div style={S.modal} onClick={e => e.stopPropagation()}>
                    <div style={S.modalHeader}>
                      <div style={{ fontWeight: 800, fontSize: 18 }}>Yeni Sipariş Ekle</div>
                      <button style={S.closeBtn} onClick={() => setShowAddOrder(false)}>✕</button>
                    </div>
                    {formError && <div style={S.errorMsg}>{formError}</div>}
                    <div style={S.modalBody}>
                      <input style={S.inputFull} placeholder="Müşteri Adı Soyadı *" value={newOrder.customerName} onChange={e => setNewOrder({...newOrder, customerName: e.target.value})} />
                      <input style={S.inputFull} placeholder="Satılan Ürün *" value={newOrder.product} onChange={e => setNewOrder({...newOrder, product: e.target.value})} />
                      <input style={S.inputFull} type="number" placeholder="Tutar (₺) *" value={newOrder.amount} onChange={e => setNewOrder({...newOrder, amount: e.target.value})} />
